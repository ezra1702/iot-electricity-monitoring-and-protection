version: '3.8'

services:
  # 1. Database MySQL
  mysql:
    image: mysql:8.0
    container_name: voltedge_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: iot-energy
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # Mount schema.sql agar dieksekusi otomatis saat container mysql pertama kali dibuat
      - ./database/schema.sql:/docker-entrypoint-initdb.d/init.sql

  # 2. MQTT Broker (Eclipse Mosquitto)
  mqtt:
    image: eclipse-mosquitto:2
    container_name: voltedge_mqtt
    restart: always
    ports:
      - "1883:1883" # MQTT TCP Port
      - "9001:9001" # WebSockets Port (Opsional untuk frontend)
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

  # 3. Backend Express.js
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: voltedge_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DB_HOST=mysql
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=iot-energy
      - DB_PORT=3306
      - MQTT_BROKER_URL=mqtt://broker.hivemq.com:1883
    depends_on:
      - mysql
      - mqtt

  # 4. Frontend React (Vite + Nginx)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voltedge_frontend
    restart: always
    ports:
      - "3000:80" # Akses di localhost:3000
    depends_on:
      - backend

  # 5. phpMyAdmin (GUI Web untuk MySQL)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: voltedge_phpmyadmin
    restart: always
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: rootpassword
      UPLOAD_LIMIT: 300M
    ports:
      - "8081:80" # Akses phpMyAdmin di localhost:8081
    depends_on:
      - mysql

volumes:
  mysql_data:
  mosquitto_data:
  mosquitto_log:
